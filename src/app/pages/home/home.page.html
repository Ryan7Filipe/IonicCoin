<ion-header>
  <ion-toolbar>
    <ion-title>IonicCoin</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-label position="stacked">Valor</ion-label>
    <ion-input
      type="number"
      [(ngModel)]="valor">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-label>Origem</ion-label>
    <ion-select [(ngModel)]="origem">
      <ion-select-option value="USD">USD</ion-select-option>
      <ion-select-option value="BRL">BRL</ion-select-option>
      <ion-select-option value="EUR">EUR</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label>Destino</ion-label>
    <ion-select [(ngModel)]="destino">
      <ion-select-option value="USD">USD</ion-select-option>
      <ion-select-option value="BRL">BRL</ion-select-option>
      <ion-select-option value="EUR">EUR</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-button expand="block" (click)="converter()">
    Converter
  </ion-button>

  <ion-button expand="block" color="medium" (click)="inverter()">
    Inverter Moedas
  </ion-button>

  <h2>
    Resultado: {{ resultado }}
  </h2>

</ion-content>
